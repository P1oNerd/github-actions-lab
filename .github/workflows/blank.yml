name: Matrix Build

on:
  workflow_dispatch:    # Manual trigger only

jobs:
  build:
    runs-on: ${{ matrix.os }}
    # ☝️ Instead of hardcoding "ubuntu-latest",
    # we use a variable — the matrix will fill this in

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]   # 2 operating systems
        node: [18, 20]                        # 2 Node.js versions
    # ☝️ This creates a grid: 2 OS × 2 Node versions = 4 combinations
    # GitHub runs ALL FOUR in parallel automatically

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
        # ☝️ Installs whichever Node version this particular
        # combination of the matrix is using

      - name: Print environment
        run: |
          node -v
          echo "OS: $RUNNER_OS"
        # ☝️ Prints the Node version and OS name to prove
        # each job really is running a different environment
