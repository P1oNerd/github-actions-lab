name: Scheduled & Manual

on:
  schedule:
    - cron: '0 0 * * 1'    # Every Monday at midnight UTC
    # Cron format: minute hour day month weekday
    # 0=Sunday, 1=Monday ... 5=Friday

  workflow_dispatch:        # Also runnable manually
    inputs:                 # ← These become a FORM in the GitHub UI
      environment:
        description: Which environment?
        type: choice
        options: [dev, staging, prod]
        default: dev
      message:
        description: Message to print
        required: false
        default: "Hello from manual run"

jobs:
  run-task:
    runs-on: ubuntu-latest
    steps:
      - name: Print context
        run: |
          echo "Event: $GITHUB_EVENT_NAME"
          echo "Env input: ${{ inputs.environment }}"
          echo "Msg: ${{ inputs.message }}"
        # ☝️ $GITHUB_EVENT_NAME = was this triggered by schedule or manually?
        # inputs.environment = whatever the user picked from the dropdown
        # inputs.message = whatever the user typed in
